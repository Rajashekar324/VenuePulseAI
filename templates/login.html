{% extends "base.html" %}

{% block title %}VenuePulseAI – Login{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center animate-fade-up" style="min-height: 70vh;">
    <div class="card glass-panel border-0 p-4 shadow-lg" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold"><i class="bi bi-box-arrow-in-right me-2 vp-gradient-text"></i>Welcome Back</h3>
            <p class="text-secondary small">Sign in to book tickets and manage events.</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3 text-start">
                <label class="form-label text-secondary small fw-semibold">Email Address</label>
                <input type="email" name="email" class="form-control vp-select" placeholder="name@example.com" required>
            </div>

            <div class="mb-4 text-start">
                <div class="d-flex justify-content-between">
                    <label class="form-label text-secondary small fw-semibold">Password</label>
                    <a href="#" class="small text-secondary text-decoration-none">Forgot password?</a>
                </div>
                <input type="password" name="password" class="form-control vp-select" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn vp-btn-primary w-100 mb-4">
                Sign In
            </button>

            <div class="text-center">
                <span class="text-secondary small">
                    Don't have an account? <a href="{{ url_for('register') }}"
                        class="text-white text-decoration-none fw-semibold">Register here</a>
                </span>
            </div>
        </form>
    </div>
</div>
{% endblock %}
